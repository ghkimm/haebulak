<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>해부락개론</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      max-width: 380px;
      width: 100%;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #13724a;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #9a9a9a;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    a.primary {
      background: #13724a;
      color: #ffffff;
    }
    a.primary:hover { background: #0e5637; }
    a.secondary {
      border: 1px solid #d8d8d8;
      color: #3a3a3a;
    }
    a.secondary:hover { background: #f5f5f4; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>해부락개론</h1>
    <p>포트폴리오 컨설팅 서비스 프로토타입</p>
    <div class="links">
      <a href="./entry.html" class="primary">진입 화면</a>
      <a href="./workspace.html" class="secondary">작업실 (참가자)</a>
      <a href="./instructor.html" class="secondary">강사 관리</a>
    </div>
  </div>
</body>
</html>
